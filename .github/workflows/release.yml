name: Release

# Tag a version to build, package, publish, and bump the Homebrew cask:
#   git tag v0.1.2 && git push origin v0.1.2
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # to create the GitHub Release

jobs:
  release:
    runs-on: macos-26
    outputs:
      dmg_sha: ${{ steps.pkg.outputs.dmg_sha }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E 's/current = "[^"]*"/current = "'"$VERSION"'"/' Sources/CraneKit/CraneVersion.swift
          rm -f Sources/CraneKit/CraneVersion.swift.bak
          grep current Sources/CraneKit/CraneVersion.swift

      - name: Test
        run: swift test

      - name: Build .app bundle
        run: ./Scripts/bundle.sh

      # TODO (clean Gatekeeper install): sign with Developer ID + notarize here, using secrets
      # (CERT_P12_BASE64, CERT_PASSWORD, NOTARY_APPLE_ID, NOTARY_TEAM_ID, NOTARY_PASSWORD).

      - name: Package (.dmg with drag-to-Applications + .zip, arm64)
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent build/Crane.app "Crane-${VERSION}-arm64.zip"

          brew install create-dmg
          create-dmg \
            --volname "Crane" \
            --window-pos 200 120 --window-size 540 380 \
            --icon-size 110 \
            --icon "Crane.app" 150 190 \
            --hide-extension "Crane.app" \
            --app-drop-link 390 190 \
            "Crane-${VERSION}-arm64.dmg" "build/Crane.app" || true
          test -f "Crane-${VERSION}-arm64.dmg"   # create-dmg may exit non-zero yet still produce the dmg

          SHA="$(shasum -a 256 "Crane-${VERSION}-arm64.dmg" | awk '{print $1}')"
          echo "dmg_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Crane-*-arm64.dmg
            Crane-*-arm64.zip
          body: |
            ## Crane ${{ github.ref_name }}

            Native macOS app for Apple's `container` tool. **Apple Silicon only** — Apple's
            containerization runs only on arm64 Macs.

            **Install via Homebrew:**
            ```
            brew install --cask lewyuburi/tap/crane
            ```

            Or download the `.dmg` below and drag Crane to Applications.

            DMG SHA-256: `${{ steps.pkg.outputs.dmg_sha }}`

  # Auto-bumps Casks/crane.rb in the tap repo. Requires a repo secret TAP_TOKEN — a PAT with
  # contents:write on lewyuburi/homebrew-tap. If the secret is absent the job is skipped.
  bump-cask:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'lewyuburi/crane' }}
    steps:
      - name: Check out the tap
        uses: actions/checkout@v4
        with:
          repository: lewyuburi/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}

      - name: Bump cask
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA: ${{ needs.release.outputs.dmg_sha }}
        run: |
          sed -i -E "s/version \"[^\"]+\"/version \"${VERSION}\"/" Casks/crane.rb
          sed -i -E "s/sha256 \"[^\"]+\"/sha256 \"${SHA}\"/" Casks/crane.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "crane ${VERSION}" && git push
