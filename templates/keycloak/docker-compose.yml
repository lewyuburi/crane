services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    restart: unless-stopped
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "${PORT}:8080"
    volumes:
      - keycloak:/opt/keycloak/data
volumes:
  keycloak:
